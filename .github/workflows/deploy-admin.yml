name: Deploy Admin

on:
  push:
    branches: [main]
    paths:
      - "front-end/admin/**"
      - "front-end/shared-ui/**"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "package.json"
  workflow_dispatch:

concurrency:
  group: deploy-admin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy Admin to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug secrets check
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" ]; then
            echo "WARNING: NEXT_PUBLIC_SUPABASE_URL secret is EMPTY in GitHub!"
          else
            echo "SUCCESS: NEXT_PUBLIC_SUPABASE_URL secret is configured."
          fi
          if [ -z "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" ]; then
            echo "WARNING: NEXT_PUBLIC_SUPABASE_ANON_KEY secret is EMPTY in GitHub!"
          else
            echo "SUCCESS: NEXT_PUBLIC_SUPABASE_ANON_KEY secret is configured."
          fi

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env file for build
        run: |
          # Write to sub-project root
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" > front-end/admin/.env
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> front-end/admin/.env
          # Write to monorepo root
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" > .env
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> .env

      - name: Build shared-ui
        run: pnpm turbo build --filter=@saa/shared-ui

      - name: Build admin app (Next.js)
        run: pnpm --filter=@saa/admin build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Transform for Cloudflare Pages
        run: npx @cloudflare/next-on-pages
        working-directory: front-end/admin
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Create Cloudflare Pages project (if not exists)
        run: |
          if npx wrangler pages project list | grep -q "saa-admin"; then
            echo "Project saa-admin already exists."
          else
            npx wrangler pages project create saa-admin --production-branch=main
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output --project-name=saa-admin --branch=main
          workingDirectory: front-end/admin
