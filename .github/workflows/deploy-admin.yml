name: Deploy Admin

on:
  push:
    branches: [main]
    paths:
      - "front-end/admin/**"
      - "front-end/shared-ui/**"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "package.json"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: deploy-admin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy Admin to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared-ui
        run: pnpm turbo build --filter=@saa/shared-ui

      - name: Build admin for Cloudflare Pages
        run: |
          printf "NEXT_PUBLIC_SUPABASE_URL=%s\nNEXT_PUBLIC_SUPABASE_ANON_KEY=%s\n" "$NEXT_PUBLIC_SUPABASE_URL" "$NEXT_PUBLIC_SUPABASE_ANON_KEY" > .env.production.local
          printf "NEXT_PUBLIC_SUPABASE_URL=%s\nNEXT_PUBLIC_SUPABASE_ANON_KEY=%s\n" "$NEXT_PUBLIC_SUPABASE_URL" "$NEXT_PUBLIC_SUPABASE_ANON_KEY" > ../../.env.production.local
          npx @cloudflare/next-on-pages
        working-directory: front-end/admin
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Verify env vars baked into client chunks
        working-directory: front-end/admin
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        run: |
          echo "--- All files containing Supabase URL ---"
          grep -rl "$NEXT_PUBLIC_SUPABASE_URL" .vercel/output/ 2>/dev/null || true
          echo "--- Client chunks specifically ---"
          client_count=$(grep -rl "$NEXT_PUBLIC_SUPABASE_URL" .vercel/output/static/_next/static/chunks/ 2>/dev/null | wc -l)
          echo "Client chunks with URL: $client_count"
          if [ "$client_count" -gt 0 ]; then
            echo "✅ Supabase URL correctly baked into client JS chunks"
          else
            echo "❌ Supabase URL NOT in client chunks — browser will see empty env vars"
            exit 1
          fi

      - name: Create Cloudflare Pages project (if not exists)
        run: |
          if npx wrangler pages project list | grep -q "saa-admin"; then
            echo "Project saa-admin already exists."
          else
            npx wrangler pages project create saa-admin --production-branch=main
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output --project-name=saa-admin --branch=main
          workingDirectory: front-end/admin
