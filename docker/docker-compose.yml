# Local PostgreSQL for direct DB access, migrations, and psql tooling.
#
# For the FULL Supabase stack (API, Auth, Studio, Realtime):
#   cd back-end && pnpm db:start
#
# Usage:
#   docker compose -f docker/docker-compose.yml up -d
#   psql postgresql://postgres:postgres@localhost:54322/postgres

networks:
  saa-network:
    driver: bridge

volumes:
  db-data:

services:
  db:
    image: supabase/postgres:15.8.1.085
    restart: unless-stopped
    ports:
      - "54322:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      JWT_EXP: 3600
    volumes:
      - db-data:/var/lib/postgresql/data
      - ../back-end/supabase/migrations:/docker-entrypoint-initdb.d/migrations
    networks:
      - saa-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
